<!DOCTYPE html>
<html lang="en">
<head>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8849YBK81C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-8849YBK81C');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    {% block title %}{% endblock %}
    {% block meta_description %}{% endblock %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/prismjs@1.30.0/themes/prism-tomorrow.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', path='/favicon.ico') }}" type="image/x-icon">

</head>

<body class="{% block body_class %}loaded{% endblock %}">

    <nav class="site-nav">
        <div class="nav-left">
            <a href="/" class="nav-logo">sg<span class="accent">@</span>grishuk</a>
            <span class="nav-tilde">~</span>
        </div>
        <div class="nav-right">
            <span class="status-dot"></span>
            <span class="status-text">available</span>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer class="site-footer">
        <span>&copy; 2026 grishuk.co.il</span>
    </footer>
    {% endblock %}

    <script src="https://unpkg.com/prismjs@1.30.0/components/prism-core.min.js"></script>
    <script src="https://unpkg.com/prismjs@1.30.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="{{ url_for('static', path='/main.js') }}"></script>

</body>
</html>
